<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>FRIDAY Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#252525;--text:#e8e8e8;--text2:#999;--accent:#6fa8ff;--accent2:#4a7fd4;--user-bg:#2b3b5c;--border:#333;--shadow:0 2px 12px rgba(0,0,0,.4)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
header h1{font-size:18px;font-weight:600;flex:1}
header .status{width:8px;height:8px;border-radius:50%;background:#555}
header .status.online{background:#4caf50}
header .status.offline{background:#f44336}
#chat{flex:1;overflow-y:auto;padding:12px 16px;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:4px}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.msg{display:flex;margin-bottom:14px;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{justify-content:flex-end}
.msg.friday{justify-content:flex-start}
.msg.system{justify-content:center}
.msg.system .bubble{background:transparent;color:var(--text2);font-size:12px;padding:4px 12px}
.bubble{max-width:85%;padding:10px 14px;border-radius:16px;font-size:15px;line-height:1.45;word-wrap:break-word}
.msg.user .bubble{background:var(--user-bg);border-bottom-right-radius:4px;color:#fff}
.msg.friday .bubble{background:var(--surface2);border-bottom-left-radius:4px;color:var(--text)}
.bubble .time{font-size:11px;color:var(--text2);margin-top:4px;opacity:.7}
.msg.user .bubble .time{text-align:right}
.typing{display:flex;gap:4px;padding:4px 0}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--text2);animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.input-bar{background:var(--surface);border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.input-wrap{flex:1;background:var(--surface2);border-radius:20px;display:flex;align-items:flex-end;padding:4px}
textarea{flex:1;border:none;background:transparent;color:var(--text);font-size:15px;font-family:inherit;resize:none;padding:8px 12px;max-height:120px;outline:none;line-height:1.4}
textarea::placeholder{color:var(--text2)}
.btn{width:40px;height:40px;border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;touch-action:manipulation}
.btn svg{width:22px;height:22px;fill:#fff}
.btn-mic{background:var(--accent2)}
.btn-mic.listening{background:#e05050;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,80,80,.5)}50%{box-shadow:0 0 0 12px rgba(224,80,80,0)}}
.btn-send{background:var(--accent)}
.btn:active{transform:scale(.92)}
.quick-actions{display:flex;gap:8px;padding:8px 16px;overflow-x:auto;flex-shrink:0;background:var(--surface);border-top:1px solid var(--border)}
.quick-actions::-webkit-scrollbar{display:none}
.quick-btn{white-space:nowrap;padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;flex-shrink:0;touch-action:manipulation}
.quick-btn:active{background:var(--accent);color:#fff;border-color:var(--accent)}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
#toast.show{opacity:1}
</style>
</head>
<body>

<header>
  <h1>FRIDAY</h1>
  <span class="status" id="statusDot"></span>
</header>

<div id="chat">
  <div class="msg system"><div class="bubble">Connected to FRIDAY</div></div>
</div>

<div class="quick-actions" id="quickActions">
  <button class="quick-btn" data-cmd="open whatsapp">WhatsApp</button>
  <button class="quick-btn" data-cmd="open gmail">Gmail</button>
  <button class="quick-btn" data-cmd="tell me todays news">News</button>
  <button class="quick-btn" data-cmd="see my screen">Screen</button>
  <button class="quick-btn" data-cmd="what time is it">Time</button>
  <button class="quick-btn" data-cmd="weather in mumbai">Weather</button>
</div>

<div class="input-bar">
  <div class="input-wrap">
    <textarea id="input" rows="1" placeholder="Message FRIDAY..." enterkeyhint="send"></textarea>
  </div>
  <button class="btn btn-mic" id="micBtn" aria-label="Voice">
    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-1c-.49 0-.9.36-.98.85C16.52 14.5 14.41 16 12 16s-4.52-1.5-4.93-2.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1.01 1.14.4 2.87 3.03 5.05 6.02 5.05s5.62-2.18 6.02-5.05c.08-.6-.4-1.14-1.01-1.14z"/></svg>
  </button>
  <button class="btn btn-send" id="sendBtn" aria-label="Send">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<div id="toast"></div>

<script>
const TOKEN = new URLSearchParams(location.search).get('key') || '';
const BASE = location.origin;

const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const statusDot = document.getElementById('statusDot');
const toast = document.getElementById('toast');

let lastId = 0;
let isListening = false;
let recognition = null;

// Auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// Send message
async function sendMessage(text) {
  text = (text || input.value).trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  addMessage('user', text);
  showTyping();
  scrollDown();

  try {
    const res = await fetch(`/api/chat?key=${TOKEN}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({command: text})
    });
    const data = await res.json();
    hideTyping();
    if (data.ok && data.reply) {
      addMessage('friday', data.reply);
    } else if (data.ok && data.message) {
      addMessage('friday', data.message);
    }
  } catch(e) {
    hideTyping();
    addMessage('system', 'Connection lost. Retrying...');
  }
  scrollDown();
}

// Add message bubble
function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}<div class="time">${time}</div></div>`;
  chat.appendChild(div);
  scrollDown();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg friday';
  div.id = 'typing';
  div.innerHTML = '<div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  chat.appendChild(div);
}

function hideTyping() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

function scrollDown() {
  chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// Show toast
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// Send on Enter (Shift+Enter for newline)
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
sendBtn.addEventListener('click', () => sendMessage());

// Quick actions
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => sendMessage(btn.dataset.cmd));
});

// Voice input
if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'en-IN';
  recognition.interimResults = false;
  recognition.continuous = false;

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    showToast('Listening...');
  };
  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
  };
  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript;
    input.value = text;
    sendMessage(text);
  };
  recognition.onerror = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    showToast('Voice not recognized');
  };

  micBtn.addEventListener('click', () => {
    if (isListening) {
      recognition.stop();
    } else {
      try { recognition.start(); } catch(e) { showToast('Mic error'); }
    }
  });
} else {
  micBtn.style.opacity = '0.3';
  micBtn.title = 'Voice not supported on this browser';
}

// Poll for status & sync
async function pollStatus() {
  try {
    const res = await fetch(`/api/status?key=${TOKEN}`);
    const data = await res.json();
    statusDot.className = 'status ' + (data.online ? 'online' : 'offline');

    // Sync messages from PC side
    if (data.log && data.log.length > 0) {
      const last = data.log[data.log.length - 1];
      if (last.id && last.id > lastId) {
        lastId = last.id;
        // Only add if not from phone
      }
    }
  } catch(e) {
    statusDot.className = 'status offline';
  }
}

// Load chat history
async function loadHistory() {
  try {
    const res = await fetch(`/api/history?key=${TOKEN}`);
    const data = await res.json();
    if (data.ok && data.messages) {
      chat.innerHTML = '';
      data.messages.forEach(m => addMessage(m.role, m.text));
      scrollDown();
    }
  } catch(e) {}
}

// Init
loadHistory();
setInterval(pollStatus, 3000);
pollStatus();

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') input.blur();
});
</script>
</body>
</html>
